<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ouirelle AI 0.1a</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Yumuşak Altın & Berrak Beyaz paleti */
            --bg:            #FAF6EC;  /* sıcak krem zemin */
            --surface:       #FFFFFF;  /* berrak beyaz kart */
            --sidebar-bg:    #F5EEDC;  /* açık altın kenar çubuğu */
            --ink:           #3B3220;  /* koyu sıcak metin */
            --ink-soft:      #8A7A57;  /* soluk altın ikincil metin */
            --line:          #ECE2CC;  /* yumuşak altın çizgi */
            --primary:       #C6A15B;  /* yumuşak altın */
            --primary-deep:  #A8823D;  /* koyu altın */
            --primary-soft:  #F6EFDD;  /* çok açık altın yıkama */
            --ouirelle-text: #A8823D;  /* asistan ismi rengi */
            --user-text:     #6B5A34;  /* kullanıcı ismi rengi */
            --danger:        #C0563C;
            --radius:        16px;
            --shadow:        0 4px 20px rgba(120, 95, 40, 0.08);
            --shadow-lg:     0 18px 55px rgba(90, 65, 20, 0.18);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            display: flex;
            height: 100vh;
            height: 100dvh;
            color: var(--ink);
            overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        button { font-family: inherit; }
        input { font-family: inherit; color: var(--ink); }

        /* Altın gradyanlı logo yazısı */
        .brand-mark {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            background: linear-gradient(120deg, #C6A15B, #E6C878, #B8860B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            user-select: none;
            white-space: nowrap;
        }

        /* --- GİRİŞ / KAYIT EKRANI (Auth Screen) --- */
        #auth-screen {
            position: fixed;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            z-index: 1000;
            background:
                radial-gradient(900px 560px at 18% 8%, #F4DCA0 0%, transparent 55%),
                radial-gradient(820px 560px at 86% 92%, #E9C77A 0%, transparent 52%),
                #F4EBD6;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .auth-box {
            width: 100%;
            max-width: 380px;
            padding: 40px 36px;
            text-align: center;
            background: var(--surface);
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
        }

        .auth-box .brand-mark {
            font-size: 34px;
            display: inline-block;
            margin-bottom: 8px;
        }

        .auth-box p {
            color: var(--ink-soft);
            margin-bottom: 26px;
            font-size: 14px;
        }

        .auth-input {
            width: 100%;
            padding: 13px 15px;
            margin-bottom: 12px;
            border: 1px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: var(--surface);
        }

        .auth-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .auth-btn {
            width: 100%;
            padding: 13px;
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            margin-top: 6px;
            margin-bottom: 10px;
        }

        .auth-btn:hover { background-color: var(--primary-deep); }
        .auth-btn:active { transform: scale(0.98); }

        .auth-switch {
            background: none;
            border: none;
            color: var(--primary-deep);
            font-size: 14px;
            cursor: pointer;
            font-weight: 600;
        }
        .auth-switch:hover { text-decoration: underline; }

        .auth-error {
            color: var(--danger);
            background-color: #FBEDE8;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            display: none;
            text-align: left;
        }

        /* --- SOL PANEL (Sidebar) --- */
        .sidebar {
            width: 268px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--line);
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            height: 100%;
            flex-shrink: 0;
            transition: transform 0.28s ease;
        }

        .sidebar-brand {
            font-family: 'Sora', sans-serif;
            font-size: 20px;
            padding: 6px 8px 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
        }

        /* Sadece mobilde görünen kapatma butonu */
        .sidebar-close {
            display: none;
            background: none;
            border: none;
            font-size: 22px;
            line-height: 1;
            color: var(--ink-soft);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 8px;
        }
        .sidebar-close:hover { background: var(--primary-soft); color: var(--ink); }

        /* Çekmece açıkken arka planı karartan örtü */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(45, 35, 15, 0.38);
            backdrop-filter: blur(2px);
            z-index: 40;
            opacity: 0;
            transition: opacity 0.28s ease;
        }
        .sidebar-overlay.show { opacity: 1; }

        .new-chat-btn {
            background-color: var(--surface);
            color: var(--primary-deep);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .new-chat-btn:hover {
            background-color: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .chat-history {
            list-style: none;
            overflow-y: auto;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-history li {
            padding: 11px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-history li:hover { background-color: var(--primary-soft); }

        .chat-history li.active {
            background-color: var(--primary);
            color: #fff;
        }

        /* Sol Panel Profil Alanı */
        .user-profile {
            margin-top: auto;
            padding-top: 14px;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            color: var(--ink);
            min-width: 0;
        }
        .user-info span:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .logout-btn {
            background: none;
            border: none;
            color: var(--ink-soft);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s;
            flex-shrink: 0;
        }
        .logout-btn:hover { color: var(--danger); }

        /* --- ANA İÇERİK --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100%;
        }

        .header {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 16px;
            padding-top: max(14px, env(safe-area-inset-top));
            font-size: 20px;
            position: sticky;
            top: 0;
            background: rgba(250, 246, 236, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            z-index: 10;
        }
        .header .brand-mark { font-size: 22px; }

        /* Hamburger menü butonu — yalnızca mobilde görünür */
        .menu-btn {
            display: none;
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: var(--primary-deep);
            box-shadow: var(--shadow);
        }
        .menu-btn:active { transform: translateY(-50%) scale(0.94); }

        .chat-container {
            width: 100%;
            max-width: 850px;
            flex: 1;
            padding: 24px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .message-bubble {
            background-color: var(--surface);
            border-radius: var(--radius);
            padding: 18px 20px;
            line-height: 1.6;
            max-width: 85%;
            box-shadow: var(--shadow);
            word-wrap: break-word;
            font-size: 15px;
        }

        .ouirelle-message {
            align-self: flex-start;
            border-left: 3px solid var(--primary);
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary-soft);
        }

        .user-message strong { color: var(--user-text); }
        .ouirelle-message strong { color: var(--ouirelle-text); }
        .message-bubble strong {
            font-family: 'Sora', sans-serif;
            font-weight: 600;
        }

        /* Scrollbar Ayarları */
        ::-webkit-scrollbar { width: 9px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* --- GİRİŞ ALANI --- */
        .input-container {
            width: 100%;
            max-width: 850px;
            padding: 14px 20px 26px;
            display: flex;
            gap: 12px;
        }

        .input-box {
            flex: 1;
            background-color: var(--surface);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 14px 20px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
            box-shadow: var(--shadow);
        }

        .input-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
        }

        .send-btn {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 999px;
            padding: 0 28px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .send-btn:hover { background-color: var(--primary-deep); }
        .send-btn:active { transform: scale(0.98); }
        .send-btn:disabled {
            background-color: var(--line);
            color: var(--ink-soft);
            cursor: not-allowed;
        }

        .blinking-cursor::after {
            content: '|';
            animation: blink 1s step-end infinite;
            color: var(--primary);
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* ---------- MOBİL ---------- */
        @media (max-width: 768px) {
            .main-content { min-width: 0; width: 100%; }

            .menu-btn { display: flex; }
            .sidebar-close { display: block; }

            /* Kenar çubuğu kayan çekmece olur */
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: 82vw;
                max-width: 320px;
                z-index: 50;
                transform: translateX(-100%);
                box-shadow: var(--shadow-lg);
                padding-top: max(18px, env(safe-area-inset-top));
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }

            .chat-container {
                padding: 16px 14px;
                gap: 14px;
            }
            .message-bubble {
                max-width: 92%;
                padding: 15px 16px;
                font-size: 15px;
            }

            .input-container {
                padding: 10px 12px;
                padding-bottom: max(14px, env(safe-area-inset-bottom));
                gap: 8px;
            }
            .input-box {
                padding: 13px 18px;
                font-size: 16px; /* iOS'ta otomatik yakınlaştırmayı engeller */
            }
            .send-btn { padding: 0 20px; }

            .auth-box { padding: 32px 22px; }
        }

        @media (max-width: 380px) {
            .send-btn {
                padding: 0 16px;
                font-size: 14px;
            }
            .header .brand-mark { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- GİRİŞ / KAYIT EKRANI (AUTH OVERLAY) -->
    <div id="auth-screen">
        <!-- Giriş Paneli -->
        <div class="auth-box" id="login-box">
            <div class="brand-mark">✨ Ouirelle</div>
            <p>Yapay zeka atölyesine adım at</p>
            <div class="auth-error" id="login-error"></div>
            <input type="email" id="login-email" class="auth-input" placeholder="E-posta adresi" autocomplete="email">
            <input type="password" id="login-password" class="auth-input" placeholder="Şifre">
            <button class="auth-btn" id="login-btn" onclick="handleLogin()">Giriş Yap</button>
            <button class="auth-switch" onclick="toggleAuthMode('register')">Hesabın yok mu? Kayıt Ol</button>
        </div>

        <!-- Kayıt Paneli -->
        <div class="auth-box" id="register-box" style="display: none;">
            <div class="brand-mark">✨ Ouirelle</div>
            <p>Yeni bir Ouirelle zihni oluştur</p>
            <div class="auth-error" id="register-error"></div>
            <input type="text" id="reg-name" class="auth-input" placeholder="Ad Soyad" autocomplete="name">
            <input type="email" id="reg-email" class="auth-input" placeholder="E-posta adresi" autocomplete="email">
            <input type="password" id="reg-password" class="auth-input" placeholder="Güçlü bir şifre">
            <button class="auth-btn" id="register-btn" onclick="handleRegister()">Kayıt Ol</button>
            <button class="auth-switch" onclick="toggleAuthMode('login')">Zaten hesabın var mı? Giriş Yap</button>
        </div>
    </div>

    <!-- ANA UYGULAMA ARAYÜZÜ -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="brand-mark">✨ Ouirelle</span>
            <button class="sidebar-close" onclick="closeSidebar()" aria-label="Menüyü kapat">✕</button>
        </div>
        <button class="new-chat-btn" onclick="startNewChat()">+ Yeni Sohbet</button>
        <ul class="chat-history" id="chat-history"></ul>

        <!-- Alt Profil Alanı -->
        <div class="user-profile">
            <div class="user-info">
                <span>✨</span>
                <span id="user-display-name">Yükleniyor...</span>
            </div>
            <button class="logout-btn" onclick="handleLogout()">Çıkış Yap</button>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <button class="menu-btn" onclick="openSidebar()" aria-label="Menüyü aç">☰</button>
            <span class="brand-mark">✨ Ouirelle</span>
        </div>

        <div class="chat-container" id="chat-container">
            <div class="message-bubble ouirelle-message">
                <strong>Ouirelle:</strong> Merhaba, ben Ouirelle. ✨<br><br>Hoş geldin. Bugün ne geliştirmek veya tasarlamak istersin?
            </div>
        </div>

        <div class="input-container">
            <input type="text" id="user-input" class="input-box" placeholder="Ouirelle'e bir mesaj gönder..." autocomplete="off">
            <button id="send-btn" class="send-btn" onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        // DİKKAT: Buraya kendi güncel Ngrok linkini yazmalısın!
        const API_BASE_URL = "https://landlord-rekindle-wispy.ngrok-free.dev";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const chatHistory = document.getElementById('chat-history');
        const authScreen = document.getElementById('auth-screen');
        const loginBox = document.getElementById('login-box');
        const registerBox = document.getElementById('register-box');
        const userDisplayName = document.getElementById('user-display-name');
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        // --- SOHBET STATE YÖNETİMİ ---
        let currentChatId = null;
        let isNewChat = true;

        // --- MOBİL KENAR ÇUBUĞU (ÇEKMECE) ---
        function openSidebar() {
            sidebar.classList.add('open');
            sidebarOverlay.classList.add('show');
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        }
        // Küçük ekranlarda çekmece açıkken bir öğe seçilince otomatik kapansın
        function closeSidebarOnMobile() {
            if (window.matchMedia('(max-width: 768px)').matches) closeSidebar();
        }

        // Enter tuşu dinleyicisi
        userInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        // Escape ile çekmeceyi kapat
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeSidebar();
        });
        // Masaüstü genişliğine geçilince çekmece durumunu temizle
        window.addEventListener("resize", () => {
            if (!window.matchMedia('(max-width: 768px)').matches) closeSidebar();
        });

        // --- SAYFA YÜKLENDİĞİNDE AUTH KONTROLÜ ---
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem("ouirelle_token");
            const name = localStorage.getItem("ouirelle_user_name");

            if (token) {
                authScreen.style.opacity = '0';
                authScreen.style.visibility = 'hidden';
                userDisplayName.textContent = name || "Kullanıcı";
                loadUserChatHistory();
            } else {
                userDisplayName.textContent = "Giriş Yapılmadı";
            }
        });

        function toggleAuthMode(mode) {
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('register-error').style.display = 'none';
            if (mode === 'register') {
                loginBox.style.display = 'none';
                registerBox.style.display = 'block';
            } else {
                registerBox.style.display = 'none';
                loginBox.style.display = 'block';
            }
        }

        // --- GİRİŞ YAPMA İŞLEMİ ---
        async function handleLogin() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            const loginBtn = document.getElementById('login-btn');

            if (!email || !password) {
                errorDiv.textContent = "Lütfen tüm alanları doldurun.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                loginBtn.disabled = true;
                loginBtn.textContent = "Giriş Yapılıyor...";

                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);

                const response = await fetch(`${API_BASE_URL}/token`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'ngrok-skip-browser-warning': 'true' // Ngrok uyarısını atlar
                    },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Giriş başarısız oldu.");
                }

                localStorage.setItem("ouirelle_token", data.access_token);
                localStorage.setItem("ouirelle_user_name", data.user_name);
                userDisplayName.textContent = data.user_name;

                authScreen.style.opacity = '0';
                setTimeout(() => authScreen.style.visibility = 'hidden', 400);

                loadUserChatHistory();
                startNewChat();

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Giriş Yap";
            }
        }

        // --- KAYIT OLMA İŞLEMİ ---
        async function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const errorDiv = document.getElementById('register-error');
            const regBtn = document.getElementById('register-btn');

            if (!name || !email || !password) {
                errorDiv.textContent = "Lütfen tüm alanları eksiksiz doldurun.";
                errorDiv.style.display = 'block';
                return;
            }

            try {
                regBtn.disabled = true;
                regBtn.textContent = "Hesap Oluşturuluyor...";

                const response = await fetch(`${API_BASE_URL}/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true' // Ngrok uyarısını atlar
                    },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || "Kayıt işlemi başarısız.");
                }

                alert("Hesabın başarıyla oluşturuldu! Şimdi giriş yapabilirsin.");
                toggleAuthMode('login');
                document.getElementById('login-email').value = email;

            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
            } finally {
                regBtn.disabled = false;
                regBtn.textContent = "Kayıt Ol";
            }
        }

        // --- GÜVENLİ ÇIKIŞ YAPMA ---
        function handleLogout() {
            localStorage.clear();
            currentChatId = null;
            isNewChat = true;
            chatHistory.innerHTML = "";
            chatContainer.innerHTML = `
                <div class="message-bubble ouirelle-message">
                    <strong>Ouirelle:</strong> Merhaba, ben Ouirelle. ✨<br><br>Hoş geldin. Bugün ne geliştirmek veya tasarlamak istersin?
                </div>
            `;
            authScreen.style.visibility = 'visible';
            authScreen.style.opacity = '1';
            document.getElementById('login-password').value = "";
        }

        // --- MONGODB'DEN SOHBET GEÇMİŞİNİ YÜKLEME ---
        async function loadUserChatHistory() {
            const token = localStorage.getItem("ouirelle_token");
            if (!token) return;

            try {
                const response = await fetch(`${API_BASE_URL}/chats`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'ngrok-skip-browser-warning': 'true' // Ngrok uyarısını atlar
                    }
                });
                if (!response.ok) return;

                const chats = await response.json();
                chatHistory.innerHTML = "";

                chats.forEach(chat => {
                    const li = document.createElement("li");
                    li.textContent = chat.title || "Eski Sohbet";
                    li.id = `sidebar-chat-${chat.id}`;
                    li.onclick = () => loadSpecificChat(chat.id, li);
                    chatHistory.appendChild(li);
                });
            } catch (e) {
                console.error("Geçmiş yüklenirken hata oluştu:", e);
            }
        }

        // --- BELİRLİ BİR SOHBETİN DETAYLARINI EKRANA BASMA ---
        async function loadSpecificChat(chatId, liElement) {
            const token = localStorage.getItem("ouirelle_token");
            if (!token) return;

            try {
                chatContainer.innerHTML = "<div style='text-align:center; padding:20px; opacity:0.6;'>Sohbet yükleniyor...</div>";

                const response = await fetch(`${API_BASE_URL}/chats/${chatId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'ngrok-skip-browser-warning': 'true' // Ngrok uyarısını atlar
                    }
                });
                if (!response.ok) throw new Error();

                const data = await response.json();
                chatContainer.innerHTML = "";
                currentChatId = chatId;
                isNewChat = false;

                document.querySelectorAll('.chat-history li').forEach(li => li.classList.remove('active'));
                if (liElement) liElement.classList.add('active');
                closeSidebarOnMobile();

                data.messages.forEach(msg => {
                    if (msg.role === "user") {
                        addMessage("Sen", msg.content, "user-message");
                    } else {
                        addMessage("Ouirelle", msg.content.replace(/\n/g, '<br>'), "ouirelle-message");
                    }
                });

                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (err) {
                chatContainer.innerHTML = "<span style='color:red;'>[Sohbet yüklenemedi.]</span>";
            }
        }

        function startNewChat() {
            chatContainer.innerHTML = `
                <div class="message-bubble ouirelle-message">
                    <strong>Ouirelle:</strong> Merhaba, ben Ouirelle. ✨<br><br>Hoş geldin. Bugün ne geliştirmek veya tasarlamak istersin?
                </div>
            `;
            isNewChat = true;
            currentChatId = null;
            userInput.value = "";
            document.querySelectorAll('.chat-history li').forEach(li => li.classList.remove('active'));
            closeSidebarOnMobile();
            userInput.focus();
        }

        // --- MESAJA CEVAP VERME VE STREAM ALANI ---
        async function sendMessage() {
            const text = userInput.value.trim();
            const token = localStorage.getItem("ouirelle_token");

            if (!text) return;
            if (!token) {
                handleLogout();
                return;
            }

            let temporaryLi = null;
            if (isNewChat) {
                chatContainer.innerHTML = "";
                const title = text.split(" ").slice(0, 4).join(" ") + "...";
                temporaryLi = document.createElement("li");
                temporaryLi.textContent = title;
                temporaryLi.classList.add('active');
                chatHistory.prepend(temporaryLi);
            }

            addMessage("Sen", text, "user-message");
            userInput.value = "";
            sendBtn.disabled = true;
            sendBtn.textContent = "Düşünüyor...";

            const responseContainer = addMessage("Ouirelle", "<span class='blinking-cursor'></span>", "ouirelle-message");
            const textNode = responseContainer.querySelector('.message-content');

            try {
                const response = await fetch(`${API_BASE_URL}/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`,
                        'ngrok-skip-browser-warning': 'true' // Ngrok uyarısını atlar
                    },
                    body: JSON.stringify({
                        message: text,
                        chat_id: currentChatId
                    })
                });

                if (!response.ok) throw new Error("Sunucu hatası veya yetki süresi doldu.");

                const serverChatId = response.headers.get('X-Chat-ID');
                if (serverChatId && isNewChat) {
                    currentChatId = serverChatId;
                    isNewChat = false;
                    temporaryLi.id = `sidebar-chat-${serverChatId}`;
                    temporaryLi.onclick = () => loadSpecificChat(serverChatId, temporaryLi);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder("utf-8");
                textNode.innerHTML = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    textNode.innerHTML += chunk.replace(/\n/g, '<br>');
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }
            } catch (error) {
                textNode.innerHTML = `<span style='color:red;'>[Sistem Hatası: ${error.message}]</span>`;
                if (isNewChat && temporaryLi) temporaryLi.remove();
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = "Gönder";
                userInput.focus();
            }
        }

        function addMessage(sender, text, className) {
            const bubble = document.createElement("div");
            bubble.className = `message-bubble ${className}`;
            bubble.innerHTML = `<strong>${sender}:</strong> <span class="message-content">${text}</span>`;
            chatContainer.appendChild(bubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return bubble;
        }
    </script>
</body>
</html>
